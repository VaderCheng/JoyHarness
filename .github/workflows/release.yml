name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --noconfirm --clean --onedir --windowed --name JoyHarness --add-data "config;config" --add-data "assets;assets" pyinstaller_entry.py

      - name: Package zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag) { $tag = "manual-${{ github.run_number }}" }
          $zip = "JoyHarness-windows-x64-$tag.zip"
          Compress-Archive -Path "dist\JoyHarness\*" -DestinationPath $zip -Force
          "ASSET_PATH=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: JoyHarness-windows-x64
          path: ${{ env.ASSET_PATH }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" "${{ env.ASSET_PATH }}" --title "JoyHarness ${{ github.ref_name }}" --notes "Windows x64 build generated by GitHub Actions."
